<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenAI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 720px;
      height: 90vh;
      background: white;
      border-radius: 16px;
      border: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }

    .header h1 { font-size: 15px; font-weight: 600; color: #111; }

    .provider-select {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background: white;
      color: #555;
      cursor: pointer;
      outline: none;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message { display: flex; gap: 10px; align-items: flex-start; }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .avatar.ai { background: #ede9fe; color: #7c3aed; }
    .avatar.user { background: #dbeafe; color: #1d4ed8; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: #111;
    }

    .message.ai .bubble { background: #f9f9f9; border: 1px solid #e5e5e5; border-top-left-radius: 4px; }
    .message.user .bubble { background: #6d28d9; color: white; border-top-right-radius: 4px; }

    .typing .bubble { color: #999; font-style: italic; }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      color: #111;
    }

    textarea:focus { border-color: #7c3aed; }

    button#send-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #6d28d9;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    button#send-btn:hover { background: #5b21b6; }
    button#send-btn:disabled { background: #d1d5db; cursor: not-allowed; }

    button#send-btn svg { width: 18px; height: 18px; fill: white; }

    .session-info {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      padding: 6px 0 0;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      gap: 8px;
    }

    .empty-state .icon { font-size: 32px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="dot"></div>
      <h1>GenAI Chat</h1>
    </div>
    <select class="provider-select" id="provider">
      <option value="groq">Groq (Llama 3.3)</option>
      <option value="openai">OpenAI (GPT-4o)</option>
      <option value="anthropic">Anthropic (Claude)</option>
    </select>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <p>Start a conversation</p>
    </div>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Type a message... (Enter to send, Shift+Enter for new line)"
      rows="1"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="session-info" id="session-info">Session: —</div>
</div>

<script>
  const SESSION_ID = "session-" + Math.random().toString(36).substr(2, 9);
  const API_URL = "http://localhost:8000/chat";

  document.getElementById("session-info").textContent = "Session: " + SESSION_ID;

  const input = document.getElementById("input");
  const messagesEl = document.getElementById("messages");
  const sendBtn = document.getElementById("send-btn");

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  // Enter to send, Shift+Enter for newline
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text) {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const msg = document.createElement("div");
    msg.className = "message " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar " + role;
    avatar.textContent = role === "user" ? "AK" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  function addTyping() {
    const msg = document.createElement("div");
    msg.className = "message ai typing";
    msg.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = "Thinking...";

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    const provider = document.getElementById("provider").value;

    addMessage("user", text);
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: SESSION_ID,
          message: text,
          provider: provider
        })
      });

      const data = await res.json();
      removeTyping();

      if (res.ok) {
        addMessage("ai", data.response);
      } else {
        addMessage("ai", "Error: " + (data.detail || "Something went wrong"));
      }
    } catch (err) {
      removeTyping();
      addMessage("ai", "Could not reach the server. Is FastAPI running?");
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
